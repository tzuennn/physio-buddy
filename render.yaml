services:
  - type: web
    name: physio-buddy
    runtime: python
    buildCommand: "pip install -e '.[vision]'"
    startCommand: "uvicorn physio_buddy.app:app --host 0.0.0.0 --port $PORT"

    # Camera access REQUIRES HTTPS. Render provides this automatically.
    # https://docs.render.com/web-services

    envVars:
      # ── MediaPipe: auto-downloads model on first start ─────────────────────
      - key: MEDIAPIPE_POSE_TASK_AUTO_DOWNLOAD
        value: "true"
      - key: MEDIAPIPE_POSE_TASK_CACHE_DIR
        value: "/opt/render/project/.cache/models"

      # ── LLM coach (recommended: Groq free tier) ───────────────────────────
      # 1. Sign up free at https://console.groq.com
      # 2. Create an API key
      # 3. Paste it in the Render dashboard under Environment → LLM_API_KEY
      #    (never put real keys in this file — set them in the dashboard)
      - key: LLM_API_URL
        value: "https://api.groq.com/openai/v1"
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"
      - key: LLM_TIMEOUT_S
        value: "5.0"
      - key: LLM_API_KEY
        sync: false # caregiver fills this in the Render dashboard, never committed to git

      # ── MERaLiON audio analysis (optional) ────────────────────────────────
      - key: MERALION_API_KEY
        sync: false # caregiver fills this in the Render dashboard, never committed to git
